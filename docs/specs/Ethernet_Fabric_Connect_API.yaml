      required:
      - bandwidth
      - options
      type: object
      properties:
        bandwidth:
          $ref: "#/components/schemas/ConnectionBandwidth"
        options:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/ConnectionBandwidthPriceOption"
      description: Priced options grouped by bandwidth
      example:
        bandwidth: 1000
        options:
        - category: datacenter
          class_of_service: basic
          price_hourly: "0.625000"
          price_monthly: "375.000000"
