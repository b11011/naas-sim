components:
  schemas:
    Gateway:
      required:
      - gateway_id
      type: object
      properties:
        gateway_id:
          $ref: "#/components/schemas/McgwEntityId"
        name:
          type: string
          description: Human-readable gateway name
          example: MCGW-East
      example:
        gateway_id: d2bdc87d-3f76-4db6-8d2a-1f5f4b3fbbf2
        name: MCGW-East
    Interface:
      required:
      - interface_id
      type: object
      properties:
        interface_id:
          $ref: "#/components/schemas/McgwEntityId"
        name:
          type: string
          description: Human-readable interface name
          example: Primary Interface
      example:
        interface_id: f0b9cf7b-18ca-4d04-82d5-76198ca6d34f
        name: Primary Interface
    HostedEndpoint:
      type: object
      example:
        gateway:
          gateway_id: d2bdc87d-3f76-4db6-8d2a-1f5f4b3fbbf2
          name: MCGW-East
        interface:
          interface_id: f0b9cf7b-18ca-4d04-82d5-76198ca6d34f
          name: Primary Interface
        ipv4_address: 10.10.0.1/30
      oneOf:
      - $ref: "#/components/schemas/GatewayEndpoint"
      - $ref: "#/components/schemas/Port"
    McgwEntityId:
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      type: string
      description: Unique identifier for the MCGW entities formatted as a UUID (Universally Unique Identifier).
      example: 123e4567-e89b-12d3-a456-426614174000
    Connection:
      type: object
      example:
        connection_id: 7b21e3a1-3f6b-4d73-8fd4-73d07efdf50b
        state: active
        type: mcgw.aws
        name: Hosted AWS Connection
        source_endpoint:
          gateway:
            gateway_id: d2bdc87d-3f76-4db6-8d2a-1f5f4b3fbbf2
            name: MCGW-East
          interface:
            interface_id: f0b9cf7b-18ca-4d04-82d5-76198ca6d34f
            name: Primary Interface
          ipv4_address: 10.10.0.1/30
        dest_endpoint:
          on_ramp: aws-us-east-1
          vlan: 200
        bandwidth: 1000
        term: Monthly
        customer_number: 1-ABCD
        billing_account_number: 1-1ABCDE-F
      allOf:
      - $ref: "#/components/schemas/BaseConnectionResponse"
      - oneOf:
        - $ref: "#/components/schemas/HostedAwsConnection"
        - $ref: "#/components/schemas/HostedAzureConnection"
        - $ref: "#/components/schemas/HostedGcpConnection"
        - $ref: "#/components/schemas/HostedOciConnection"
        - $ref: "#/components/schemas/P2PVirtualConnection"
        - $ref: "#/components/schemas/LciConnection"
    ConnectionList:
      required:
      - data
      - pagination
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        data:
          type: array
          description: List of connections
          items:
            $ref: "#/components/schemas/Connection"
      description: Paginated list of connections.
      example:
        pagination:
          offset: 0
          limit: 25
          total: 1
        data:
        - connection_id: 7b21e3a1-3f6b-4d73-8fd4-73d07efdf50b
          state: active
          type: mcgw.aws
          name: Hosted AWS Connection
          source_endpoint:
            gateway:
              gateway_id: d2bdc87d-3f76-4db6-8d2a-1f5f4b3fbbf2
              name: MCGW-East
            interface:
              interface_id: f0b9cf7b-18ca-4d04-82d5-76198ca6d34f
              name: Primary Interface
            ipv4_address: 10.10.0.1/30
          dest_endpoint:
            on_ramp: aws-us-east-1
            vlan: 200
          bandwidth: 1000
          term: Monthly
          customer_number: 1-ABCD
          billing_account_number: 1-1ABCDE-F
    ListP2PVirtualConnectionResponse:
      required:
      - data
      - pagination
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        data:
          type: array
          description: List of point-to-point virtual connections
          items:
            $ref: "#/components/schemas/P2PVirtualConnection"
      description: Paginated list of point-to-point virtual connections
      example:
        pagination:
          offset: 0
          limit: 25
          total: 1
        data:
        - connection_id: 55555555-5555-4555-8555-555555555555
          state: active
          type: port.port
          name: P2P Virtual Connection
          source_endpoint:
            service_id: TN/KXFN/000002/LVLC
            ce_vlan: 240
          dest_endpoint:
            service_id: TN/KXFN/000003/LVLC
            ce_vlan: 241
          bandwidth: 500
          customer_number: 1-ABCD
          billing_account_number: 1-1ABCDE-F
    ListHostedAwsConnectionResponse:
      required:
      - data
      - pagination
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        data:
          type: array
          description: List of AWS hosted connections.
          items:
            $ref: "#/components/schemas/HostedAwsConnection"
      description: Paginated list of AWS hosted connections
      example:
        pagination:
          offset: 0
          limit: 25
          total: 1
        data:
        - connection_id: 11111111-1111-4111-8111-111111111111
          state: active
          type: mcgw.aws
          name: Hosted AWS Connection
          source_endpoint:
            gateway:
              gateway_id: d2bdc87d-3f76-4db6-8d2a-1f5f4b3fbbf2
              name: MCGW-East
            interface:
              interface_id: f0b9cf7b-18ca-4d04-82d5-76198ca6d34f
              name: Primary Interface
            ipv4_address: 10.10.0.1/30
          dest_endpoint:
            on_ramp: aws-us-east-1
            vlan: 200
          bandwidth: 1000
          customer_number: 1-ABCD
          billing_account_number: 1-1ABCDE-F
    ListHostedGcpConnectionResponse:
      required:
