      required:
      - category
      - class_of_service
      - price_hourly
      - price_monthly
      type: object
      properties:
        category:
          $ref: "#/components/schemas/PricingCategory"
        class_of_service:
          $ref: "#/components/schemas/ClassOfService"
        price_hourly:
          pattern: "^(0|[1-9]\\d*)(\\.\\d{1,6})?$"
          type: string
          description: Hourly price in decimal format
