openapi: 3.0.2
info:
  title: Ethernet Fabric Connect API
  description: <p>Ethernet Fabric Connect APIs enable customers to connect clouds or fabric ports to a Multi-Cloud Gateway interface. Ethernet Fabric Connect works with the following cloud service providers 
    <ul>
      <li>Amazon Web Services (AWS)</li>
      <li>Google Cloud Platform (GCP)</li>
      <li>Microsoft Azure</li>
      <li>Oracle Cloud Infrastructure (OCI)</li>
    </p>
  version: 1.0.0
servers:
- url: https://api.lumen.com/fabric/v1
  description: Production server
security:
- OAuth2: []
tags:
- name: Connections
  description: Manage connections.
- name: AWS
  description: Manage Amazon Web Services connections.
- name: Azure
  description: Manage Azure connections.
- name: GCP
  description: Manage Google Cloud Platform connections.
- name: OCI
  description: Manage Oracle Cloud Infrastructure connections.
- name: Point-to-point
  description: Manage point-to-point virtual connections.
paths:
  /connections/virtual/p2p:
    get:
      tags:
      - Point-to-point
      summary: Get point-to-point virtual connections.
      description: Retrieve a list of all point-to-point virtual connections between Multi-Cloud Gateways.
      operationId: listP2pVirtualConnections
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves a list of point-to-point virtual connections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListP2PVirtualConnectionResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    post:
      tags:
      - Point-to-point
      summary: Create a point-to-point virtual connection.
      description: Create a point-to-point virtual connection between two Multi-Cloud Gateways.
      operationId: createP2PVirtualConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateP2PVirtualConnection"
        required: true
      responses:
        "202":
          description: Accepted. The request creates the point-to-point virtual connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PVirtualConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections/virtual/p2p/{connection_id}:
    get:
      tags:
      - Point-to-point
      summary: Get point-to-point virtual connection.
      description: Retrieves details about a specified point-to-point virtual connection.
      operationId: p2PVirtualConnectionDetails
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: connection_id
        in: path
        description: ID of the point-to-point virtual connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK. The request retrieves details about the specified point-to-point virtual connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PVirtualConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    delete:
      tags:
      - Point-to-point
      summary: Delete point-to-point virtual connection.
      description: Delete a point-to-point virtual connection between two Multi-Cloud Gateways.
      operationId: deleteP2PVirtualConnection
      parameters:
      - name: connection_id
        in: path
        description: Unique identifier for the connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "204":
          description: Connection deleted successfully
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "405":
          $ref: "#/components/responses/405MethodNotAllowed"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    patch:
      tags:
      - Point-to-point
      summary: Update point-to-point virtual connection.
      description: Update the name, description, and/or bandwidth of a specified point-to-point virtual connection between two Multi-Cloud Gateways.
      operationId: updateP2PVirtualConnection
      parameters:
      - name: connection_id
        in: path
        description: ID of the point-to-point virtual connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConnection"
        required: true
      responses:
        "200":
          description: OK. The request updates the point-to-point virtual connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PVirtualConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections:
    get:
      tags:
      - Connections
      summary: Get connections.
      description: Retrieve details for all connections.
      operationId: listConnectionSummaries
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves connection details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionList"
              examples:
                default:
                  $ref: "#/components/examples/connections-list-200"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections/{connection_id}:
    get:
      tags:
      - Connections
      summary: Get connection details.
      description: Retrieve details for a specified connection.
      operationId: connectionSummaryDetails
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: connection_id
        in: path
        description: Unique identifier of the connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK. The request retrieves details for the specified connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
              examples:
                aws_connection:
                  $ref: "#/components/examples/connection-details-aws"
                azure_connection:
                  $ref: "#/components/examples/connection-details-azure"
                gcp_connection:
                  $ref: "#/components/examples/connection-details-gcp"
                oci_connection:
                  $ref: "#/components/examples/connection-details-oci"
                p2p_connection:
                  $ref: "#/components/examples/connection-details-p2p"
                ilm_connection:
                  $ref: "#/components/examples/connection-details-ilm"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections/{connection_id}/bandwidths:
    get:
      tags:
      - Connections
      summary: Get bandwidths.
      description: Retrieve a detailed list of available bandwidth options for a specified connection.
      operationId: listBandwidthOptionsForExistingConnection
      parameters:
      - name: connection_id
        in: path
        description: Unique identifier for the connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK. The request retrieves the bandwidth options for the connection.
          content:
            application/json:
              schema:
                type: array
                description: List of priced options for connection bandwidths
                items:
                  $ref: "#/components/schemas/ConnectionBandwidthPriceGroup"
              example:
              - bandwidth: 50
                options:
                - category: datacenter
                  class_of_service: basic
                  price_hourly: "0.062500"
                  price_monthly: "37.500000"
              - bandwidth: 1000
                options:
                - category: metro
                  class_of_service: basic
                  price_hourly: "0.625000"
                  price_monthly: "375.000000"
                - category: longhaul
                  class_of_service: dedicated
                  price_hourly: "0.704200"
                  price_monthly: "422.520000"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /billing/{connection_id}:
    get:
      tags:
      - Connections
      summary: Get connection pricing.
      description: Retrieves the effective price of a specified connection.
      operationId: connectionBillingDetails
      parameters:
      - name: connection_id
        in: path
        description: Unique identifier for the connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK. The request retrieves the connection pricing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectivePrice"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections/cloud/hosted/aws:
    get:
      tags:
      - AWS
      summary: Get AWS connections.
      description: Retrieve a detailed list of your connections between AWS cloud and Multi-Cloud Gateway.
      operationId: listHostedAWSConnections
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves a list of AWS to Multi-Cloud Gateway connections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHostedAwsConnectionResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    post:
      tags:
      - AWS
      summary: Create AWS connection.
      description: Create a connection between an AWS cloud and Multi-Cloud Gateway.
      operationId: createHostedAWSConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHostedAwsConnection"
            examples:
              source_endpoint_mcgw:
                $ref: "#/components/examples/create-hosted-aws-source-endpoint-mcgw"
              source_endpoint_port:
                $ref: "#/components/examples/create-hosted-aws-source-endpoint-port"
        required: true
      responses:
        "202":
          description: Accepted. The request creates the connection between the AWS cloud and Multi-Cloud Gateway.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedAwsConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections/cloud/hosted/aws/{connection_id}:
    get:
      tags:
      - AWS
      summary: Get AWS connection details.
      description: Retrieve details about a specified AWS cloud and Multi-Cloud Gateway connection.
      operationId: hostedAwsConnectionDetails
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: connection_id
        in: path
        description: Unique identifier of the AWS connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK. The request retrieves details about the specified connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedAwsConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    delete:
      tags:
      - AWS
      summary: Delete AWS connection.
      description: Delete a specified AWS and Multi-Cloud Gateway connection.
      operationId: deleteHostedAwsConnection
      parameters:
      - name: connection_id
        in: path
        description: Unique identifier of the AWS connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "204":
          description: No Content. The request deletes the specified AWS and Multi-Cloud connection.
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    patch:
      tags:
      - AWS
      summary: Update AWS connection.
      description: Update a specified AWS and Multi-Cloud Gateway connection.
      operationId: updateHostedAwsConnection
      parameters:
      - name: connection_id
        in: path
        description: Unique identifier of the AWS connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHostedAwsConnection"
        required: true
      responses:
        "200":
          description: OK. The request updates the AWS connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedAwsConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections/cloud/hosted/gcp:
    get:
      tags:
      - GCP
      summary: Get GCP connections.
      description: Retrieve a detailed list of GCP to Multi-Cloud Gateway connections.
      operationId: listHostedGcpConnections
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves a detailed list of GCP to Multi-Cloud Gateway connections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHostedGcpConnectionResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    post:
      tags:
      - GCP
      summary: Create GCP connection.
      description: Create a connection between GCP and Multi-Cloud Gateway.
      operationId: createHostedGcpConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHostedGcpConnection"
            examples:
              source_endpoint_mcgw:
                $ref: "#/components/examples/create-hosted-gcp-source-endpoint-mcgw"
              source_endpoint_port:
                $ref: "#/components/examples/create-hosted-gcp-source-endpoint-port"
        required: true
      responses:
        "202":
          description: Accepted. The request creates the GCP to Multi-Cloud Gateway connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedGcpConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /connections/cloud/hosted/gcp/{connection_id}:
    get:
      tags:
      - GCP
      summary: Get GCP connection details.
      description: Retrieve details about a specified GCP to Multi-Cloud Gateway connection.
      operationId: hostedGcpConnectionDetails
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: connection_id
        in: path
        description: Unique identifier of the GCP to Multi-Cloud Gateway connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK. The request retrieves details about the specified GCP to Multi-Cloud Gateway connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedGcpConnection"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    delete:
      tags:
      - GCP
      summary: Delete GCP connection.
      description: Delete a specified GCP to Multi-Cloud Gateway connection.
      operationId: deleteHostedGcpConnection
      parameters:
      - name: connection_id
        in: path
        description: Unique identifier of the GCP connection.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "204":
          description: No Content. The request deletes the specified GCP connection.
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    patch:
      tags:
      - GCP
      summary: Update GCP connection.
      description: Update a connection between GCP and Multi-Cloud Gateway.
      operationId: updateConnectionMcgwGcp
      parameters:
      - name: connection_id
        in: path
        description: Unique identifier of the GCP connection.
