          dest_endpoint:
            description: OCI virtual circuit
            on_ramp: oci-phx
            vlan: 230
            port: Port-1
          bandwidth: 1000
          customer_number: 1-ABCD
          billing_account_number: 1-1ABCDE-F
    ConnectionBandwidth:
      type: integer
      description: Bandwidth of the connection in Megabits per second (Mbps).
      example: 5000
      enum:
      - 10
      - 20
      - 50
      - 100
      - 200
      - 300
      - 400
      - 500
      - 1000
      - 2000
      - 3000
      - 5000
      - 10000
      - 15000
      - 20000
      - 25000
      - 30000
      - 40000
      - 50000
      - 60000
      - 70000
      - 80000
      - 90000
      - 100000
    UpdateConnection:
      type: object
      properties:
        name:
          maxLength: 255
          type: string
          description: Name of the connection
          example: Connection 1
        description:
          type: string
          description: Description of the connection
          example: Primary connection
        bandwidth:
          $ref: "#/components/schemas/ConnectionBandwidth"
      description: Patch Connection
      example:
        name: Virtual Point-to-Point Connection
        description: Updated connection description
        bandwidth: 500
    EffectivePrice:
      required:
      - effective_at
      - period
      - rate
      type: object
      properties:
        period:
          $ref: "#/components/schemas/PricingTerm"
        rate:
          pattern: "^(0|[1-9]\\d*)(\\.\\d{1,6})?$"
          type: string
          description: Decimal monetary amount with up to 6 fractional digits.
          example: "123.456789"
        effective_at:
          type: string
          description: "RFC 3339 timestamp when this price became effective (captured at provisioning or tier change). Immutable until replaced (e.g., gateway tier PATCH)."
          format: date-time
          readOnly: true
        terminated_at:
          type: string
          description: RFC 3339 timestamp when this price was terminated.
          format: date-time
          readOnly: true
      additionalProperties: true
      example:
        period: Monthly
        rate: "375.000000"
        effective_at: 2024-01-01T12:00:00Z
    UpdateHostedAwsConnection:
      type: object
      properties:
