components:
  schemas:
    ResourceName:
      pattern: "^[A-Za-z0-9_' -]{1,32}$"
      type: string
      description: "Name of the resource, up to 32 characters, allowing letters, apostrophes, numbers, spaces, and hyphens."
      example: My Resource-01
    IpAddressFamily:
      type: string
      description: IP Address Family (IPV4 or IPV6).
      example: IPV4
      enum:
      - IPV4
      default: IPV4
    Tier:
      type: string
      description: Tier of the MCGW Service
      example: 50 Gbps
      enum:
      - 10 Gbps
      - 50 Gbps
      - Unlimited
    CreatePrefixListId:
      required:
      - prefix_list_id
      type: object
      properties:
        prefix_list_id:
          $ref: "#/components/schemas/McgwEntityId"
    McgwEntityId:
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      type: string
      description: Unique identifier for the MCGW Entities
      example: 4c85553e-91ce-4eab-9551-2014985f8c84
    Med:
      type: integer
      description: Multi-Exit Discriminator (MED) value for the BGP session
      example: 100
      enum:
      - 100
      - 200
      - 300
    PrefixListRef:
      type: object
      properties:
        prefix_list_id:
          allOf:
          - $ref: "#/components/schemas/McgwEntityId"
          - description: Prefix list ID
        name:
          type: string
          description: Prefix list name
    Asn:
      type: integer
      description: Autonomous System Number for BGP routing.
      example: 1
      enum:
      - 1
      default: 1
    RemoteAsn:
      maximum: 65535
      minimum: 1
      type: integer
      description: Remote Autonomous System Number for BGP routing.
      example: 65534
    RemotePeerIp:
      pattern: "^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}$"
      type: string
      description: Remote peer IP address for the BGP session
      example: 192.168.7.34
    BfdInterval:
      type: integer
      description: BFD interval in milliseconds for the BGP session
      example: 500
      enum:
      - 500
      - 1000
      - 1500
      - 2000
      default: 500
    BfdMultiplier:
      maximum: 10
      minimum: 5
      type: integer
      description: BFD multiplier for the BGP session
      example: 6
      default: 5
    ConnectionBandwidth:
      type: integer
      description: Bandwidth of the connection in Megabits per second (Mbps).
      example: 5000
      enum:
      - 10
      - 20
      - 50
      - 100
      - 200
      - 300
      - 400
      - 500
      - 1000
      - 2000
      - 3000
      - 5000
      - 10000
      - 15000
      - 20000
      - 25000
      - 30000
      - 40000
      - 50000
      - 60000
      - 70000
      - 80000
      - 90000
      - 100000
    CreatedAt:
      type: string
      description: Timestamp when the resource was created
      format: date-time
      readOnly: true
      example: 2025-10-10T14:20:25Z
    CreatedBy:
      type: string
      description: The person or system that submitted a request creating the resource
      readOnly: true
      example: Laura Palmer
    UpdatedAt:
      type: string
      description: Timestamp when the resource was last modified
      format: date-time
      nullable: true
      readOnly: true
      example: 2025-11-10T14:25:25Z
    UpdatedBy:
      type: string
      description: The person or system that last submitting a request modifying the resource
      nullable: true
      readOnly: true
      example: Dale Cooper
    LifecycleStatus:
      type: string
      description: The lifecycle status of the resource
      readOnly: true
      example: PROVISIONED
      enum:
      - PENDING
      - PROVISIONING
      - PROVISIONED
      - FAILED
      - DELETING
      - DELETED
    GatewayTierPrice:
      required:
      - price_monthly
      - tier
      type: object
      properties:
        tier:
          type: string
          description: Gateway tier identifier
          example: 100G
        price_monthly:
          pattern: "^(0|[1-9]\\d*)(\\.\\d{1,6})?$"
          type: string
          description: Monthly price as a decimal string with up to 6 fractional digits
          example: "375.0"
      additionalProperties: false
      example:
        tier: 100G
        price_monthly: "750.000000"
    InterfacePrice:
      required:
      - interface
      - price_hourly
      - price_monthly
      type: object
      properties:
        interface:
          type: string
          description: Interface type identifier
          example: default
        price_hourly:
          pattern: "^(0|[1-9]\\d*)(\\.\\d{1,6})?$"
          type: string
          description: Hourly price as a decimal string with up to 6 fractional digits
          example: "0.20"
        price_monthly:
          pattern: "^(0|[1-9]\\d*)(\\.\\d{1,6})?$"
          type: string
          description: Monthly price as a decimal string with up to 6 fractional digits
          example: "100.80"
      additionalProperties: false
      example:
        interface: default
        price_hourly: "0.200000"
        price_monthly: "100.800000"
    EffectivePrice:
      required:
      - effective_at
      - period
      - rate
      type: object
      properties:
        period:
          $ref: "#/components/schemas/PricingTerm"
        rate:
          pattern: "^(0|[1-9]\\d*)(\\.\\d{1,6})?$"
          type: string
          description: Decimal monetary amount with up to 6 fractional digits.
          example: "123.456789"
        effective_at:
          type: string
          description: "RFC 3339 timestamp when this price became effective (captured at provisioning or tier change). Immutable until replaced (e.g., gateway tier PATCH)."
          format: date-time
          readOnly: true
        terminated_at:
          type: string
          description: RFC 3339 timestamp when this price was terminated.
          format: date-time
          readOnly: true
      additionalProperties: true
      example:
        period: Monthly
        rate: "375.000000"
        effective_at: 2026-01-01T12:00:00Z
    PricingTerm:
      type: string
      description: Pricing Term
      example: Hourly
      enum:
      - Hourly
      - Monthly
      default: Monthly
    GatewayTerm:
      type: string
      description: Gateway Term
      example: Monthly
      enum:
      - Monthly
      default: Monthly
    CreateMultiCloudGateway:
      required:
      - billing_account_number
      - customer_number
      - name
      - tier
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
        description:
          maxLength: 500
          type: string
          example: Primary production gateway for east region cloud connectivity
        tier:
          $ref: "#/components/schemas/Tier"
        asn:
          $ref: "#/components/schemas/Asn"
        customer_number:
          $ref: "#/components/schemas/customerNumber"
        billing_account_number:
          $ref: "#/components/schemas/billingAccountNumber"
        term:
          $ref: "#/components/schemas/GatewayTerm"
      additionalProperties: false
      description: Request body to create a Multi-Cloud Gateway
      example:
        name: Primary-Prod-MCGW
        description: Primary production gateway for east region cloud connectivity
        tier: 50 Gbps
        asn: 1
        customer_number: 1-ABCD
        billing_account_number: 1-1ABCDE-F
        term: Monthly
    UpdateMultiCloudGateway:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
        description:
          maxLength: 500
          type: string
          description: Optional detailed description of the MCGW
          example: Primary production gateway for east region cloud connectivity
        tier:
          $ref: "#/components/schemas/Tier"
        term:
          $ref: "#/components/schemas/GatewayTerm"
      additionalProperties: false
      description: Request body to update a Multi-Cloud Gateway
      example:
        name: Primary-Prod-MCGW-Updated
        description: Updated production gateway description
        tier: 50 Gbps
    Gateway:
      required:
      - asn
      - name
      type: object
      properties:
        gateway_id:
          allOf:
          - $ref: "#/components/schemas/McgwEntityId"
          - description: Unique identifier for the MCGW
            example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
        state:
          $ref: "#/components/schemas/LifecycleStatus"
        name:
          $ref: "#/components/schemas/ResourceName"
        description:
          maxLength: 500
          type: string
          description: Optional detailed description of the MCGW
          example: Primary production gateway for east region cloud connectivity
        tier:
          $ref: "#/components/schemas/Tier"
        asn:
          $ref: "#/components/schemas/Asn"
        total_aggregate_bw:
          type: string
          description: Current used bandwidth on the gateway
          example: 500 Mbps
        term:
          $ref: "#/components/schemas/GatewayTerm"
        customer_number:
          $ref: "#/components/schemas/customerNumber"
        billing_account_number:
          $ref: "#/components/schemas/billingAccountNumber"
        created_at:
          $ref: "#/components/schemas/CreatedAt"
        created_by:
          $ref: "#/components/schemas/CreatedBy"
        updated_at:
          $ref: "#/components/schemas/UpdatedAt"
        updated_by:
          $ref: "#/components/schemas/UpdatedBy"
      additionalProperties: false
      description: Details for a Multi-Cloud Gateway
      example:
        gateway_id: 4c85553e-91ce-4eab-9551-2014985f8c84
        state: PROVISIONED
        name: Primary-Prod-MCGW
        description: Primary production gateway for east region cloud connectivity
        tier: 10 Gbps
        asn: 1
        total_aggregate_bw: 500 Mbps
        customer_number: 1-ABCD
        billing_account_number: 1-1ABCDE-F
        created_at: 2026-01-01T12:00:00Z
        created_by: user123
        updated_at: 2026-01-10T12:00:00Z
        updated_by: user123
    ListGatewayResponse:
      required:
      - data
      - pagination
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        data:
          type: array
          description: List of gateways matching the query parameters
          items:
            $ref: "#/components/schemas/Gateway"
      description: Response body for listing Multi-Cloud Gateways with pagination details
      example:
        pagination:
          offset: 0
          limit: 25
          total: 1
        data:
        - gateway_id: 4c85553e-91ce-4eab-9551-2014985f8c84
          state: PROVISIONED
          name: Primary-Prod-MCGW
          description: Primary production gateway for east region cloud connectivity
          tier: 10 Gbps
          asn: 1
          total_aggregate_bw: 500 Mbps
          customer_number: 1-ABCD
          billing_account_number: 1-1ABCDE-F
          created_at: 2026-01-01T12:00:00Z
          created_by: user123
          updated_at: 2026-01-10T12:00:00Z
          updated_by: user123
    ListInterfaceResponse:
      required:
      - data
      - pagination
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        data:
          type: array
          description: List of gateways matching the query parameters
          items:
            $ref: "#/components/schemas/Interface"
      example:
        pagination:
