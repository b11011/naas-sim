openapi: 3.0.2
info:
  title: Multi-Cloud Gateway APIs
  description: "Multi-Cloud Gateway (MCGW) APIs provides customers a virtual routing service, that can be used to route between Fabric Connections, Fabric Services, and Fabric Ports. APIs provide different levels of control over routing and policies including the ability to establish and control BGP peering."
  version: 1.0.0
servers:
- url: https://api.lumen.com/mcgw/v1
  description: Production
security:
- OAuth2: []
tags:
- name: Multi-Cloud Gateway
  description: Create and manage Multi-Cloud Gateways.
- name: Multi-Cloud Gateway Interface
  description: Associate a Fabric Service with a VRF for BGP Management.
- name: BGP Management
  description: Manage BGP peering sessions for specific Multi-Cloud Gateway.interfaces.
- name: Prefix List
  description: Manage prefix lists for Multi-Cloud Gateway interfaces.
- name: Static Routes
  description: Manage static routes for Multi-Cloud Gateway interfaces.
paths:
  /gateways:
    get:
      tags:
      - Multi-Cloud Gateway
      summary: Get gateways.
      description: Retrieve a detailed list of Multi-Cloud Gateways.
      operationId: listGateways
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: billing_account_number
        in: query
        description: Billing account number.
        required: false
        schema:
          $ref: "#/components/schemas/billingAccountNumber"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves a list of Multi-Cloud Gateways.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewayResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    post:
      tags:
      - Multi-Cloud Gateway
      summary: Create gateway.
      description: |
        Create a Multi-Cloud Gateway.
      operationId: createGateway
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMultiCloudGateway"
        required: true
      responses:
        "201":
          description: Created. The request creates the Multi-Cloud Gateway.
          headers:
            Location:
              description: The URL to the newly created MCGW
              schema:
                type: string
                format: uri
                example: https://api.lumen.com/mcgw/v1/gateways/35578681-0668-4829-ac3b-6edac76ee296
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gateway"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /gateways/{gateway_id}:
    get:
      tags:
      - Multi-Cloud Gateway
      summary: Get gateway details.
      description: Retrieve details for a specified Multi-Cloud Gateway.
      operationId: gatewayDetails
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
      responses:
        "200":
          description: OK. The request retrieves details for the specified Multi-Cloud Gateway.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gateway"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    delete:
      tags:
      - Multi-Cloud Gateway
      summary: Delete gateway.
      description: Delete a specified Multi-Cloud Gateway.
      operationId: deleteGateway
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
      responses:
        "204":
          description: OK. The request deletes the specified Multi-Cloud Gateway.
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "405":
          $ref: "#/components/responses/405MethodNotAllowed"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    patch:
      tags:
      - Multi-Cloud Gateway
      summary: Update gateway.
      description: Update the name, description, or tier of a specified Multi-Cloud Gateway.
      operationId: updateGateway
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMultiCloudGateway"
        required: true
      responses:
        "200":
          description: Accepted. The request updates attributes of the specified Multi-Cloud Gateway.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gateway"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "405":
          $ref: "#/components/responses/405MethodNotAllowed"
        "409":
          $ref: "#/components/responses/409Conflict"
        "412":
          $ref: "#/components/responses/412PreconditionFailed"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /gateways/{gateway_id}/routes:
    get:
      tags:
      - Multi-Cloud Gateway
      summary: Get VRF routes.
      description: Retrieve a list of VRF routes assigned to a specified Multi-Cloud Gateway.
      operationId: listRoutes
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRouteResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /gateways/{gateway_id}/static-routes:
    get:
      tags:
      - Static Routes
      summary: Get static route list.
      description: Retrieve static route lists.
      operationId: listStaticRoutes
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the MCGW
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves the static route lists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStaticRouteResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    post:
      tags:
      - Static Routes
      summary: Create static route.
      description: Create a list of static routes for Multi-Cloud Gateway.
      operationId: createStaticRoute
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the MCGW
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaticRouteRequest"
        required: true
      responses:
        "201":
          description: Created. The request creates the static route list.
          headers:
            Location:
              description: The URL to the newly created static route
              schema:
                type: string
                format: uri
                example: https://api.lumen.com/mcgw/v1/gateways/d7d5d71c-5283-4f67-a914-30d238c26046/static-routes/35578681-0668-4829-ac3b-6edac76ee296
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaticRoute"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /gateways/{gateway_id}/static-routes/{static_route_id}:
    get:
      tags:
      - Static Routes
      summary: Retrieve a static route for MCGW.
      description: Reference the details of a specific static route for a MCGW.
      operationId: staticRouteDetails
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the MCGW
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      - name: static_route_id
        in: path
        description: Unique identifier for the static route
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaticRoute"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    delete:
      tags:
      - Static Routes
      summary: Delete static route list.
      description: Delete a specified static route list.
      operationId: deleteStaticRoute
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the MCGW
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      - name: static_route_id
        in: path
        description: Unique identifier for the static route.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "204":
          description: No Content. The request deletes the specified static route list.
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "405":
          $ref: "#/components/responses/405MethodNotAllowed"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    patch:
      tags:
      - Static Routes
      summary: Update static route.
      description: Update the name, destination, and next hop of a specified static route.
      operationId: updateStaticRoute
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the MCGW
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      - name: static_route_id
        in: path
        description: Unique identifier of the static route.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaticRouteRequest"
        required: true
      responses:
        "200":
          description: OK. The request updates the specified static route.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaticRoute"
        "204":
          description: No Content
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "405":
          $ref: "#/components/responses/405MethodNotAllowed"
        "409":
          $ref: "#/components/responses/409Conflict"
        "412":
          $ref: "#/components/responses/412PreconditionFailed"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /gateways/{gateway_id}/interfaces:
    get:
      tags:
      - Multi-Cloud Gateway Interface
      summary: Get interfaces.
      description: Retrieve interfaces for a specified Multi-Cloud Gateway.
      operationId: mcgwAllInterfaceDetails
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
          example: 5cceadea-0412-4ec7-ad31-a2de609b20bf  
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves a list of interfaces for the specified Multi-Cloud Gateway.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInterfaceResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    post:
      tags:
      - Multi-Cloud Gateway Interface
      summary: Create an interface.
      description: Create a Multi-Cloud Gateway interface.
      operationId: newMCGWInterface
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMultiCloudGatewayInterfaceRequest"
        required: true
      responses:
        "202":
          description: OK. The request creates the Multi-Cloud Gateway interface.
          headers:
            Location:
              description: The URL to the newly created MCGW interface
              schema:
                type: string
                format: uri
                example: https://api.lumen.com/mcgw/v1/gateways/d7d5d71c-5283-4f67-a914-30d238c26046/interfaces/35578681-0668-4829-ac3b-6edac76ee296
            Retry-After:
              description: Number of seconds after which to retry the request for the Interface details
              schema:
                type: integer
                example: 5
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interface"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /gateways/{gateway_id}/interfaces/{interface_id}:
    get:
      tags:
      - Multi-Cloud Gateway Interface
      summary: Get interface details.
      description: Retrieve details for a specified Multi-Gateway interface.
      operationId: mcgwInterfaceDetails
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
      - name: interface_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway interface.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
      responses:
        "200":
          description: OK. The request retrieves details for the specified Multi-Cloud Gateway interface.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interface"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    delete:
      tags:
      - Multi-Cloud Gateway Interface
      summary: Delete interface.
      description: Delete a specified Multi-Cloud Gateway interface.
      operationId: deleteInterface
      parameters:
      - name: interface_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway interface.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 4c85553e-91ce-4eab-9551-2014985f8c84
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
      responses:
        "204":
          description: OK. The request deletes the specified Multi-Cloud Gateway interface.
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "405":
          $ref: "#/components/responses/405MethodNotAllowed"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    patch:
      tags:
      - Multi-Cloud Gateway Interface
      summary: Update interface.
      description: Update a specified Multi-Cloud Gateway interface.
      operationId: updateInterface
      parameters:
      - name: gateway_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 5cceadea-0412-4ec7-ad31-a2de609b20bf
      - name: interface_id
        in: path
        description: Unique identifier for the Multi-Cloud Gateway interface.
        required: true
        schema:
          $ref: "#/components/schemas/McgwEntityId"
        example: 4c85553e-91ce-4eab-9551-2014985f8c84
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterface"
        required: true
      responses:
        "200":
          description: Accepted. The request updates the specified Multi-Cloud Gateway interface.
          headers:
            Location:
              description: The URL to the Interface
              schema:
                type: string
                format: uri
                example: https://api.lumen.com/mcgw/v1/gateways/d7d5d71c-5283-4f67-a914-30d238c26046/interfaces/35578681-0668-4829-ac3b-6edac76ee296
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interface"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "405":
          $ref: "#/components/responses/405MethodNotAllowed"
        "409":
          $ref: "#/components/responses/409Conflict"
        "412":
          $ref: "#/components/responses/412PreconditionFailed"
        "500":
          $ref: "#/components/responses/500InternalServerError"
  /prefix-lists:
    get:
      tags:
      - Prefix List
      summary: Get prefixes.
      description: Retrieve lists of all inbound and outbound IP prefixes.
      operationId: getPrefixLists
      parameters:
      - name: customer_number
        in: query
        description: Customer number.
        required: false
        schema:
          $ref: "#/components/schemas/customerNumber"
      - name: limit
        in: query
        description: Maximum number of records to return.
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 25
          x-go-name: PaginationLimit
      - name: offset
        in: query
        description: Number of records to skip for pagination.
        required: false
        schema:
          maximum: 1000000
          minimum: 0
          type: integer
          format: int32
          default: 0
      - name: all
        in: query
        description: Option to return all records without pagination.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK. The request retrieves a list of IP prefixes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPrefixListResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "500":
          $ref: "#/components/responses/500InternalServerError"
    post:
      tags:
      - Prefix List
      summary: Create prefix list.
      description: Create a prefix list for a Multi-Cloud Gateway.
      operationId: newPrefixList
